<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denúncia - CS: Justiça</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="/" class="nav-item">Manifesto</a>
            <a href="/mural" class="nav-item">Mural</a>
            <a href="/lei" class="nav-item">Lei</a>
            <a href="/contato" class="nav-item">Contato</a>
        </div>
        <div id="auth-section" class="nav-auth">
            <a href="/auth/steam" class="login-btn">LOGIN STEAM</a>
        </div>
    </nav>

    <main class="grid-contato">
        <section class="envio-mural">
            <h2 class="orange">ENVIE PARA O MURAL</h2>
            <div id="login-warning" class="warning-box">
                <p>⚠️ LOGIN NECESSÁRIO</p>
            </div>
            <form id="reportForm" class="form-contato" enctype="multipart/form-data" style="opacity: 0.5; pointer-events: none;">
                <input type="text" id="reporter" readonly required>
                <input type="text" id="offender_steam_id" placeholder="Link do Perfil Steam do Infrator" required>
                <textarea id="mensagem" placeholder="Descreva o ocorrido..." required></textarea>
                <input type="file" id="arquivo" name="arquivo" hidden accept="image/*">
                <label for="arquivo" class="btn-arquivo">ANEXAR PROVA (JPG/PNG) </label>
                <span id="file-name">Nenhum arquivo selecionado</span>
                <button type="submit" id="btnEnviar" class="send-btn" disabled>LOGUE PARA ENVIAR</button>
            </form>
        </section>
    </main>

<script>
    const reportForm = document.getElementById('reportForm');
    const inputArquivo = document.getElementById('arquivo');
    const labelTexto = document.getElementById('file-name');
    const btnEnviar = document.getElementById('btnEnviar');

    inputArquivo.addEventListener('change', () => {
        if (inputArquivo.files[0]) labelTexto.innerText = inputArquivo.files[0].name;
    });

    async function checkLoginStatus() {
        try {
            const response = await fetch('/api/user-status');
            const data = await response.json();
            if (data.logged) {
                document.getElementById('auth-section').innerHTML = `<span>${data.user.name}</span> <a href="/logout">Sair</a>`;
                reportForm.style.opacity = "1";
                reportForm.style.pointerEvents = "auto";
                document.getElementById('login-warning').style.display = "none";
                btnEnviar.disabled = false;
                btnEnviar.innerText = "ENVIAR DENÚNCIA";
                document.getElementById('reporter').value = data.user.name;
            }
        } catch (err) { console.error(err); }
    }

    reportForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnEnviar.innerText = "🚀 ENVIANDO...";
        const formData = new FormData();
        formData.append('offender_steam_id', document.getElementById('offender_steam_id').value.trim());
        formData.append('description', document.getElementById('mensagem').value);
        if (inputArquivo.files[0]) formData.append('arquivo', inputArquivo.files[0]);

        const res = await fetch('/api/reports', { method: 'POST', body: formData });
        if (res.ok) {
            alert('Enviado com sucesso! Aguarde moderação.');
            window.location.href = '/mural';
        } else {
            alert('Erro ao enviar. Verifique o servidor.');
        }
        btnEnviar.innerText = "ENVIAR DENÚNCIA";
    });

    window.onload = checkLoginStatus;
</script>
</body>
</html>
