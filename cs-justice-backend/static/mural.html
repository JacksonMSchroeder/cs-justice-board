<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural - CS: Justiça</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="/" class="nav-item">Manifesto</a>
            <a href="/mural" class="nav-item">Mural</a>
            <a href="/lei" class="nav-item">Lei</a>
            <a href="/contato" class="nav-item">Contato</a>
        </div>
        <div id="auth-section" class="nav-auth">
            <a href="/auth/steam" class="login-btn">LOGIN STEAM</a>
        </div>
    </nav>

    <header class="main-header">
        <h1>MURAL DA <span class="orange">VERGONHA</span></h1>
        <p>Jogadores documentados por comportamentos tóxicos e criminosos.</p>
    </header>

    <main>
        <div id="recent-reports-container" class="mural-container">
            <p style="text-align: center; color: #888;">Carregando registros...</p>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Projeto Independente de Combate à Toxicidade.</p>
            <p class="disclaimer">Este site não possui vínculo com a Valve Corporation ou Steam.</p>
        </div>
    </footer>

    <script>
    async function carregarMural() {
        const container = document.getElementById('recent-reports-container');
        const avatarDefault = "https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_full.jpg";
        
        try {
            const response = await fetch('/api/reports');
            const reports = await response.json();

            if (!reports || reports.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #888; padding: 20px;">[ NENHUM REGISTRO NO SISTEMA ]</p>';
                return;
            }

            container.innerHTML = '';

            reports.forEach(item => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                const statusColor = item.vac_status === 'Banido' ? '#ff4444' : '#00ff00';

                let evidenciaHTML = '';
                if (item.evidence_url) {
                    const url = item.evidence_url.toLowerCase();
                    if (url.endsWith('.mp4') || url.endsWith('.webm')) {
                        evidenciaHTML = `<div class="log-image"><video controls style="width:100%; max-height:450px;"><source src="${item.evidence_url}" type="video/mp4"></video></div>`;
                    } else if (url.endsWith('.mp3') || url.endsWith('.wav')) {
                        evidenciaHTML = `<div class="log-image"><audio controls style="width:100%;"><source src="${item.evidence_url}"></audio></div>`;
                    } else {
                        evidenciaHTML = `<div class="log-image"><img src="${item.evidence_url}" referrerpolicy="no-referrer" onclick="window.open(this.src, '_blank')"></div>`;
                    }
                }

                entry.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 12px;">
                        <img src="${item.avatarsteam || avatarDefault}" 
                             referrerpolicy="no-referrer"
                             onerror="this.src='${avatarDefault}';"
                             style="width: 50px; height: 50px; border: 2px solid #ff9d00; border-radius: 4px;">
                        <div>
                            <div style="font-size: 1.1rem; color: #ff9d00; font-weight: bold;">${item.offender_name || 'Desconhecido'}</div>
                            <div style="color: ${statusColor}; font-size: 0.8rem;">STATUS: ${item.vac_status}</div>
                        </div>
                    </div>
                    <div class="log-row">
                        <span class="log-time">[${new Date(item.created_at).toLocaleString()}]</span>
                        <span class="log-id">ID: ${item.offender_steam_id}</span>
                    </div>
                    <div class="log-desc">${item.description}</div>
                    <div style="margin: 10px 0; font-size: 0.7rem; color: #444;">DENUNCIANTE: ${item.reporter}</div>
                    ${evidenciaHTML}
                `;
                container.appendChild(entry);
            });
        } catch (err) {
            container.innerHTML = '<p style="color: #ff4444; text-align: center;">🚨 ERRO DE CONEXÃO.</p>';
        }
    }

    async function checkLoginStatus() {
        try {
            const response = await fetch('/api/user-status', { credentials: 'include' });
            const data = await response.json();
            if (data.logged) {
                document.getElementById('auth-section').innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 4px; border: 1px solid #ff8c00;">
                        <img src="${data.user.avatar}" style="width: 25px; height: 25px; border-radius: 2px;">
                        <span style="color: #fff; font-size: 0.85rem;">${data.user.name}</span>
                        <a href="/logout" style="color: #ff4444; font-size: 0.7rem; text-decoration: none; margin-left: 8px; border-left: 1px solid #333; padding-left: 8px;">SAIR</a>
                    </div>`;
            }
        } catch (err) {}
    }

    window.onload = () => { carregarMural(); checkLoginStatus(); };
</script>
</body>
</html>
