<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MURAL DOS CRIMINOSOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="/" class="nav-item">Manifesto</a>
            <a href="/mural" class="nav-item">Mural</a>
            <a href="/lei" class="nav-item">Lei</a>
            <a href="/contato" class="nav-item">Contato</a>
        </div>
        <div id="auth-section" class="nav-auth">
            <a href="/auth/steam" class="login-btn">LOGIN STEAM</a>
        </div>
    </nav>

    <div class="mural-actions">
        <a href="/contato" class="btn-reportar">
            <span class="icon">⚠️</span> NEW REPORT
        </a>
    </div>

    <header class="main-header">
        <h1>MURAL DOS <span class="orange">CRIMINOSOS</span></h1>
    </header>

    <div style="max-width: 800px; margin: 0 auto; padding: 0 20px;">
        <input type="text" id="steamSearch" placeholder="Buscar por Steam ID ou Nome..."
               style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333; color: white; font-family: inherit; border-radius: 4px;">
    </div>
    
    <main class="content-box">
        <div id="mural-logs" class="console-box">
            <p class="orange" style="text-align: center;">CARREGANDO SISTEMA...</p>
        </div>

        <div class="paginacao">
            <button id="prevBtn" class="pag-btn">← BACK</button>
            <span id="pag-number">PÁGINA 1</span>
            <button id="nextBtn" class="pag-btn">NEXT →</button>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Projeto Independente de Combate à Toxicidade.</p>
            <p class="disclaimer">Este site não possui vínculo com a Valve Corporation ou Steam.</p>
        </div>
    </footer>

    <script>
    let todosOsDados = []; 
    let dadosFiltrados = []; 
    let paginaAtual = 1;
    const itensPorPagina = 5;

    async function carregarMural() {
        const container = document.getElementById('mural-logs');
        try {
            const resposta = await fetch('/api/reports');
            if (!resposta.ok) throw new Error();
            todosOsDados = await resposta.json(); 
            dadosFiltrados = [...todosOsDados]; 
            renderizarPagina(1);
        } catch (erro) {
            if (container) container.innerHTML = '<p style="color:#ff4444; text-align:center;">🚨 ERRO DE CONEXÃO COM O TERMINAL.</p>';
        }
    }

    function filterReports() { 
        const termo = document.getElementById('steamSearch').value.toLowerCase();
        dadosFiltrados = todosOsDados.filter(item => {
            return String(item.offender_steam_id || "").toLowerCase().includes(termo) || 
                   String(item.offender_name || "").toLowerCase().includes(termo) || 
                   String(item.description || "").toLowerCase().includes(termo);
        });
        paginaAtual = 1;
        renderizarPagina(1);
    }

    function renderizarPagina(pagina) {
        paginaAtual = pagina;
        const inicio = (pagina - 1) * itensPorPagina;
        renderizarCards(dadosFiltrados.slice(inicio, inicio + itensPorPagina));
        atualizarControles();
    }

    function atualizarControles() {
        const total = Math.ceil(dadosFiltrados.length / itensPorPagina);
        const pagElement = document.getElementById('pag-number');
        if (pagElement) pagElement.innerText = `PÁGINA ${paginaAtual} DE ${total || 1}`;
        document.getElementById('prevBtn').disabled = (paginaAtual === 1);
        document.getElementById('nextBtn').disabled = (paginaAtual >= total || total === 0);
    }

    function renderizarCards(lista) {
        const container = document.getElementById('mural-logs');
        if (!container) return;
        container.innerHTML = lista.length === 0 ? '<p style="color:#666; text-align:center; padding: 20px;">[ VAZIO ]</p>' : '';

        lista.forEach(item => {
            const isBan = item.vac_status === "Banido"; 
            const cor = isBan ? '#ff4444' : '#00ff00';
            let media = '';
            if (item.evidence_url) {
                const url = item.evidence_url.toLowerCase();
                if (url.match(/\.(mp4|webm|mov)$/)) {
                    media = `<video controls style="width:100%; margin-top:10px; border-radius:4px;"><source src="${item.evidence_url}"></video>`;
                } else if (url.match(/\.(mp3|wav|m4a|ogg)$/)) {
                    media = `<audio controls style="width:100%; margin-top:10px;"><source src="${item.evidence_url}"></audio>`;
                } else {
                    media = `<img src="${item.evidence_url}" style="width:100%; margin-top:10px; border-radius:4px; cursor:pointer;" onclick="window.open(this.src)">`;
                }
            }

            const card = document.createElement('div');
            card.className = 'log-entry';
            card.style.cssText = "background:rgba(10,10,10,0.8); border:1px solid #222; padding:15px; margin-bottom:20px; border-radius:8px;";
            card.innerHTML = `
                <div style="display:flex; align-items:center; gap:15px; margin-bottom:12px;">
                    <img src="${item.avatarsteam}" style="width:45px; height:45px; border:2px solid ${cor}; border-radius:4px;">
                    <div>
                        <span style="color:#ff8c00; font-weight:bold;">${item.offender_name}</span>
                        <div style="font-size:0.7rem; color:#666;">ID: ${item.offender_steam_id}</div>
                        <span style="font-size:0.7rem; color:${cor}; font-weight:bold;">${isBan ? '🚨 BANIDO' : '✅ LIMPO'}</span>
                    </div>
                </div>
                <p style="color:#ccc; border-left:3px solid #ff8c00; padding-left:10px; font-size:0.9rem;">${item.description}</p>
                ${media}
            `;
            container.appendChild(card);
        });
    }

    async function checkLoginStatus() {
        try {
            const res = await fetch('/api/user-status');
            const data = await res.json();
            const authSection = document.getElementById('auth-section');
            if (data.logged && authSection) {
                authSection.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px; background:rgba(0,0,0,0.6); padding:5px 12px; border:1px solid #ff8c00; border-radius:4px;">
                        <img src="${data.user.avatar}" style="width:25px; height:25px; border-radius:2px; border: 1px solid #ff8c00;">
                        <span style="color:#fff; font-size:0.85rem; font-weight:bold;">${data.user.name}</span>
                        <a href="/logout" style="color:#ff4444; font-size:0.7rem; text-decoration:none; margin-left:8px; border-left:1px solid #333; padding-left:8px; font-weight:bold;">SAIR</a>
                    </div>`;
            }
        } catch (e) {
            console.error("Erro ao verificar login", e);
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        carregarMural();      
        checkLoginStatus();   
        document.getElementById('steamSearch').addEventListener('input', filterReports);
        document.getElementById('prevBtn').onclick = () => { if (paginaAtual > 1) renderizarPagina(paginaAtual - 1); };
        document.getElementById('nextBtn').onclick = () => { 
            const total = Math.ceil(dadosFiltrados.length / itensPorPagina);
            if (paginaAtual < total) renderizarPagina(paginaAtual + 1); 
        };
    });
</script>
</body>
</html>
